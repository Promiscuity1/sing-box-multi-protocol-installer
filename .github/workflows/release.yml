name: Release manager

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build archive
        run: |
          mkdir "sb-manager-${GITHUB_REF_NAME}"
          cp -R install.sh sb lib tests README.md .gitattributes .gitignore "sb-manager-${GITHUB_REF_NAME}/"
          tar -czf sb-manager.tar.gz "sb-manager-${GITHUB_REF_NAME}"
          sha256sum sb-manager.tar.gz > sb-manager.tar.gz.sha256
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            sb-manager.tar.gz \
            sb-manager.tar.gz.sha256 \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
